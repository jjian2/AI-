<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 여행 플래너 - 방문 장소</title>
<link rel="stylesheet" href="main.css">
<link rel="stylesheet" href="places.css">
</head>
<body>

  <div class="app-layout">

    <!-- 왼쪽 사이드바 (main.html과 동일 구조) -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="images/tiger.png" alt="AI 여행 플래너" class="sidebar-logo-img">
        <span>AI 여행 플래너</span>
      </div>

      <nav class="sidebar-nav">
        <a href="main.html" class="nav-item" data-target="home">
          <span class="nav-icon">🏠</span> Home
        </a>

        <div class="nav-group">
          <button type="button" class="nav-item nav-group-toggle" id="scheduleToggle">
            <span class="nav-icon">🗓️</span> 여행 일정
            <span class="nav-caret">▾</span>
          </button>

          <ul class="trip-sublist" id="tripList">
            <li class="trip-empty" id="tripEmptyMsg">아직 생성된 여행이 없어요.</li>
            <li class="trip-add" id="tripAddItem">+ 새 여행 만들기</li>
          </ul>
        </div>

        <a href="places.html" class="nav-item" data-target="places">
          <span class="nav-icon">📍</span> 방문 장소
        </a>
        <a href="#" class="nav-item" data-target="budget">
          <span class="nav-icon">💰</span> 여행 가계부
        </a>
        <a href="mypage.html" class="nav-item" data-target="mypage">
          <span class="nav-icon">👤</span> 마이페이지
        </a>
      </nav>

      <button type="button" id="logoutBtn" class="logout-btn">로그아웃</button>
    </aside>

    <!-- 메인 콘텐츠 -->
    <main class="main-content">

      <div class="page-header">
        <h1>📍 방문 장소</h1>
        <p>지도에서 핀을 확인하거나, 아래 목록에서 자세한 정보를 볼 수 있어요.</p>
      </div>

      <!-- 지도로 보기 -->
      <section class="card places-map-card">
        <h3>🗺️ 지도로 보기</h3>

        <div class="places-map" id="placesMap">
          <!-- Google Maps가 여기에 렌더링됨 (places.js의 initPlacesMap) -->
        </div>

        <p class="map-note">※ 아래 Google Maps API 스크립트에 실제 API 키를 넣어야 지도가 표시됩니다.</p>
      </section>

      <!-- 리스트로 보기 -->
      <section class="places-list-section">
        <h3>📋 목록으로 보기</h3>
        <div class="places-grid" id="placesGrid">
          <!-- 카드는 JS에서 placesData 기준으로 자동 생성됨 -->
        </div>
      </section>

    </main>
  </div>

<script src="common.js"></script>
<!-- TODO: YOUR_API_KEY를 실제 Google Maps API 키로 교체 -->
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initPlacesMap" defer></script>
<script src="places.js"></script>
</body>
</html>
