<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 여행 플래너</title>
<link rel="stylesheet" href="/css/main.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.css">
</head>
<body>

  <div class="app-layout">

    <!-- 왼쪽 사이드바 -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="/images/tiger.png" alt="AI 여행 플래너" class="sidebar-logo-img">
        <span>AI 여행 플래너</span>
      </div>

      <nav class="sidebar-nav">
        <a href="/main" class="nav-item active" data-target="home">
          <span class="nav-icon">🏠</span> Home
        </a>

        <div class="nav-group">
          <button type="button" class="nav-item nav-group-toggle" id="scheduleToggle">
            <span class="nav-icon">🗓️</span> 여행 일정
            <span class="nav-caret">▾</span>
          </button>

          <ul class="trip-sublist" id="tripList">
            <li class="trip-empty" id="tripEmptyMsg">아직 생성된 여행이 없어요.</li>
            <li class="trip-add" id="tripAddItem">+ 새 여행 만들기</li>
          </ul>
        </div>

        <a href="/places" class="nav-item" data-target="places">
          <span class="nav-icon">📍</span> 방문 장소
        </a>
        <a href="#" class="nav-item" data-target="budget">
          <span class="nav-icon">💰</span> 여행 가계부
        </a>
        <a href="#" class="nav-item" data-target="mypage">
          <span class="nav-icon">👤</span> 마이페이지
        </a>
      </nav>

      <button type="button" id="logoutBtn" class="logout-btn">로그아웃</button>
    </aside>

    <!-- 메인 콘텐츠 -->
    <main class="main-content">

      <!-- 히어로 배너 -->
      <section class="hero-banner">
        <div class="hero-overlay">
          <h1>AI가 만들어주는 맞춤 여행 플래너</h1>
          <p>여행지, 기간, 예산, 스타일만 입력하면 AI가 딱 맞는 일정을 추천해줘요.</p>
        </div>
      </section>

      <!-- 여행 조건 입력 -->
      <section class="search-panel">
        <h2>어디로 여행을 떠나시나요?</h2>

        <form id="tripForm" class="search-form">
          <input type="text" id="destination" placeholder="여행지 (예: 부산)">

          <div class="date-input-wrapper">
            <input type="text" id="duration" placeholder="날짜를 선택하세요" readonly>
            <button type="button" id="calendarBtn" class="calendar-btn" aria-label="날짜 선택">📅</button>
          </div>

          <div class="companion-wrapper">
            <input type="number" id="companionCount" placeholder="인원수" min="1">
            <select id="companionType">
              <option value="">동행 유형</option>
              <option value="혼자">혼자</option>
              <option value="커플">커플</option>
              <option value="가족">가족</option>
              <option value="친구">친구</option>
              <option value="단체">단체</option>
            </select>
          </div>
          <input type="text" id="budget" placeholder="예산 (예: 50만원)">
          <select id="travelStyle">
            <option value="">여행 스타일</option>
            <option value="relax">휴양</option>
            <option value="activity">액티비티</option>
            <option value="food">맛집 탐방</option>
            <option value="culture">문화/역사</option>
          </select>
          <button type="submit" id="generateBtn">AI 일정 생성</button>
        </form>
      </section>

      <!-- 일정 / 체크리스트 -->
      <section class="dashboard-grid two-col">
        <div class="card" id="itineraryCard">
          <h3>🕒 AI 추천 일정</h3>
          <p class="placeholder-text">여행 조건을 입력하면 일정이 생성됩니다.</p>
        </div>

		<div class="card" id="checklistCard">
		  <h3>✅ 체크리스트</h3>
		
		  <ul class="checklist">
		    <li>
		      <label>
		        <input
		          type="checkbox"
		          class="checklist-item"
		          value="신분증"
		        >
		        신분증
		      </label>
		    </li>
		
		    <li>
		      <label>
		        <input
		          type="checkbox"
		          class="checklist-item"
		          value="충전기"
		        >
		        충전기
		      </label>
		    </li>
		
		    <li>
		      <label>
		        <input
		          type="checkbox"
		          class="checklist-item"
		          value="옷"
		        >
		        옷
		      </label>
		    </li>
		
		    <li>
		      <label>
		        <input
		          type="checkbox"
		          class="checklist-item"
		          value="세면도구"
		        >
		        세면도구
		      </label>
		    </li>
		  </ul>
		</div>
      </section>

      <!-- 가계부 / 지도 -->
      <section class="dashboard-grid two-col">
		<div class="card" id="budgetCard">
		  <div class="card-header">
		    <h3>💰 여행 가계부</h3>
		
		    <button
		      type="button"
		      id="addExpenseBtn"
		      class="add-btn"
		      aria-label="지출 추가"
		    >
		      +
		    </button>
		  </div>
		
		  <ul class="budget-list" id="budgetList">
		    <li class="budget-empty" id="budgetEmptyMsg">
		      아직 등록된 지출이 없어요. 위의 + 버튼을 눌러 추가해보세요.
		    </li>
		  </ul>
		
		  <div class="budget-total-box">
		    <span>총 지출</span>
		    <strong id="budgetTotal">0원</strong>
		  </div>
		</div>

		<div class="card" id="mapCard">
		  <h3>📍 지도</h3>
		  <div id="map"></div>
		</div>
      </section>

      <!-- 추천 여행지 -->
      <section class="recommend-section">
        <h3>⭐ 추천 여행지</h3>
        <div class="recommend-grid">
          <button type="button" class="recommend-item" data-place="부산">🌊 부산</button>
          <button type="button" class="recommend-item" data-place="제주">🍊 제주</button>
          <button type="button" class="recommend-item" data-place="서울">🏙️ 서울</button>
          <button type="button" class="recommend-item" data-place="일본">🎏 일본</button>
        </div>
      </section>

    </main>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/flatpickr.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/flatpickr/4.6.13/l10n/ko.js"></script>
<script src="/js/main.js"></script>
<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBJWJ1SPehUNz5zHsDZK5iU3hUNgQOUhQg&callback=initMap"
  async
  defer>
</script>
</body>
</html>
