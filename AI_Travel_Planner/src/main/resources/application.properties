spring.application.name=AI_Travel_Planner
# 1. 데이터베이스 연결 정보 설정
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/ai_travel_planner?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true

# ⚠️ 개인 설정을 입력하세요
spring.datasource.username=root
spring.datasource.password=eunhwan0306#

# 2. JPA 및 하이버네이트 설정
# ddl-auto는 이미 테이블 구조를 덤프로 밀어넣으셨기 때문에, 구조를 유지하면서 검증만 하도록 'validate'로 지정합니다.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# MySQL 8.0 버전에 맞는 방언(Dialect) 설정
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect