<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 여행 플래너 - 로그인</title>
    <link rel="stylesheet" href="style.css">
</head>
<!-- 눈 모양 아이콘 링크 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<body>

    <div class="login-wrapper">
        <div class="login-card">

            <div class="left-panel">
                <h1>Enjoy the<br>Trip!</h1>
                <p>For you who are wandering</p>
            </div>

            <div class="right-panel">
                <img src="images/tiger.png" alt="마스코트" class="character">

                <div class="form-area">
                    <h2>로그인</h2>
                    
                    <!--<form id="loginForm">
                        <input type="text" id="userId" placeholder="ID" autocomplete="username"> 변경: 백엔드에서 @RequestParam("username")으로 받기 때문에 name="username"을 반드시 추가합니다.
                        <input type="password" id="userPw" placeholder="Password" autocomplete="current-password"> 변경: 백엔드에서 @RequestParam("password")으로 받기 때문에 name="password"를 추가합니다.
                        <button type="submit">로그인</button> 변경: 폼 데이터가 실제로 전송되도록 type="submit"으로 설정되어 있는지 확인합니다.
                    </form>    데이터를 /login 경로로, POST 방식을 통해 백엔드 컨트롤러로 쏘아 보내도록 action="/login" method="POST"를 추가했습니다.-->
                    
                    <form id="loginForm" action="/login" method="POST">
    					<input type="text" name="username" placeholder="ID" required>
    					<div class="password-container">
    						<input type="password" id="loginPw" name="password" placeholder="Password" required>
							<button type="button" class="toggle-password" onclick="togglePassword('loginPw')">
    							<i class="fa-regular fa-eye"></i>
							</button>
    					</div>
    					<button type="submit" class="login-btn">로그인</button>
    					<!-- 🌟 로그인 실패 시 여기에 빨간색 경고 문구가 뜹니다 -->
						<div id="loginErrorMsg" style="color: red; font-size: 14px; font-weight: bold; margin-bottom: 15px; display: none; text-align: center;"></div>
					</form>
					
                    <p class="signup-text">
                        계정이 없으신가요? <a href="javascript:void(0);" id="openSignup">회원가입</a>을 눌러주세요!
                    </p>
                </div>
            </div>

        </div>
    </div>

    <div class="modal-overlay" id="signupModal">
        <div class="modal-box">
            <button type="button" class="modal-close" id="closeSignup" aria-label="닫기">&times;</button>

            <h2>회원가입</h2>
            <p class="modal-subtitle">몇 가지 정보만 입력하면 바로 시작할 수 있어요.</p>

        <!--<form id="signupForm">
                <input type="text" id="signupName" placeholder="이름" autocomplete="name">

                <div class="input-with-button">
                    <input type="text" id="signupId" placeholder="아이디" autocomplete="username">
                    <button type="button" id="checkIdBtn" class="check-btn">중복확인</button>
                </div>
                <p id="idCheckMsg" class="field-msg"></p>

                <input type="email" id="signupEmail" placeholder="이메일" autocomplete="email">
                <input type="password" id="signupPw" placeholder="비밀번호" autocomplete="new-password">

                <input type="password" id="signupPwConfirm" placeholder="비밀번호 확인" autocomplete="new-password">
                <p id="pwMismatchMsg" class="field-msg error"></p>

                <button type="submit">가입하기</button>
            </form>-->
            
			
			<form id="signupForm" action="/signup" method="POST">
    			<input type="text" id="signupName" name="name" placeholder="이름" autocomplete="name" required>

    			<div class="input-with-button">
        			<input type="text" id="signupId" name="username" placeholder="아이디" autocomplete="username" required>
        			<button type="button" id="checkIdBtn" class="check-btn">중복확인</button>
    			</div>
    			<p id="idCheckMsg" class="field-msg"></p>

    			<input type="email" id="signupEmail" name="email" placeholder="이메일" autocomplete="email" required>
    			<!-- 첫 번째 비밀번호 입력란 -->
				<div class="password-container">
    				<input type="password" id="signupPw" name="password" placeholder="비밀번호" autocomplete="new-password" required>
    				<button type="button" class="toggle-password" onclick="togglePassword('signupPw')">
        				<i class="fa-regular fa-eye"></i>
    				</button>
				</div>

				<!-- 두 번째 비밀번호 확인 입력란 -->
				<div class="password-container">
    				<input type="password" id="signupPwConfirm" placeholder="비밀번호 확인" autocomplete="new-password" required>
    				<button type="button" class="toggle-password" onclick="togglePassword('signupPwConfirm')">
        				<i class="fa-regular fa-eye"></i>
    				</button>
				
				</div>
    			<p id="pwMismatchMsg" class="field-msg error"></p>

    			<button type="submit">가입하기</button>
			</form>

            <p class="modal-footer-text">
                이미 계정이 있으신가요? <a href="http://localhost:8080/index.html" id="backToLogin">로그인</a>으로 돌아가기
            </p>
        </div>
    </div> <!-- 기존 signupModal의 끝 -->

    <!-- 🌟 새로 추가: 로그인 실패 알림 모달 -->
    <div id="alertModal" class="modal-overlay">
        <div class="modal-box">
            <h2>로그인 안내</h2>
            <p>로그인 시도가 3회 이상 실패했습니다.<br>회원가입을 진행하시겠습니까?</p>
            <div class="modal-actions" style="display: flex; justify-content: center; gap: 10px; margin-top: 20px;">
                <button id="confirmSignup" style="padding: 10px 20px; cursor: pointer;">확인</button>
                <button id="closeAlert" style="padding: 10px 20px; cursor: pointer;">취소</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
